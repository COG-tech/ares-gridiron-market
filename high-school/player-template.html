<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>High School Player | ARES Gridiron Market</title>
  <link href="../assets/plugins/global/plugins.bundle.css" rel="stylesheet" media="print" onload="this.media='all'">
  <link href="../assets/css/style.bundle.css" rel="stylesheet" media="print" onload="this.media='all'">
  <link href="../assets/css/ares-theme.css?v=20260520-logo2" rel="stylesheet">
  <link href="../assets/css/ares-components.css?v=20260520-logo1" rel="stylesheet">
  <style>.page-main{width:min(100%,1280px);margin:0 auto;padding:clamp(1rem,2.4vw,2rem)}.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1rem}.profile-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem}@media(max-width:900px){.metric-grid,.profile-grid{grid-template-columns:1fr}}</style>
</head>
<body class="ares-shell">
        <header class="ares-topbar ares-mega-topbar" data-ares-root="..">
    <a class="ares-brand" href="../index.html" aria-label="ARES Gridiron Market home"><span><strong>ARES</strong><em>Gridiron Market</em></span></a>
    <button class="ares-nav-toggle" type="button" aria-expanded="false" aria-controls="ares-mega-nav">Menu</button>
    <nav id="ares-mega-nav" class="ares-nav ares-mega-nav" aria-label="Primary navigation">
      <a class="ares-home-link" href="../index.html">Home</a>
    </nav>
  </header>
  <main class="page-main">
    <section id="player-title" class="ares-page-title"><h1>High School Player</h1><p>Loading tracked profile...</p></section>
    <section id="metric-grid" class="metric-grid ares-section"></section>
    <section class="profile-grid ares-section">
      <article class="ares-card"><h2>Tracking Tags</h2><p id="tags" class="mb-0 text-muted"></p></article>
      <article class="ares-card"><h2>Source Notes</h2><p id="notes" class="mb-0 text-muted"></p></article>
    </section>
  </main><script src="../assets/js/ares-data-loader.js?v=20260519-graphics1"></script><script src="../assets/js/ares-tables.js?v=20260519-graphics1"></script>
  <script>
    (function(){const safe=window.AresData.safeText;const params=new URLSearchParams(location.search);const id=params.get("player_id")||"";const name=params.get("player_name")||"";function schoolName(row){return String(row.team_or_school||"").split(",")[0].trim();}function metric(k,v,type){let value=safe(v||"Pending");if(type==="score")value=window.AresTables.renderScoreChip(v||"","ares");if(type==="confidence")value=window.AresTables.renderConfidenceChip(v);return '<div class="ares-stat-card"><span class="label">'+safe(k)+'</span><span class="value">'+value+'</span></div>';}document.addEventListener("DOMContentLoaded",async function(){const rows=await window.AresData.loadJson("../data/tracked_players.json");const row=rows.find(r=>r.player_id===id)||rows.find(r=>r.player_name===name)||{};const school=schoolName(row);document.title=(row.player_name||"High School Player")+" | ARES Gridiron Market";document.getElementById("player-title").innerHTML="<h1>"+safe(row.player_name||"High School Player")+"</h1><p>"+safe(row.position)+" | <a href=\"school-template.html?school="+encodeURIComponent(school)+"\">"+safe(school||"School")+"</a> | "+safe(row.state||"")+"</p>";document.getElementById("metric-grid").innerHTML=[metric("Tracking Score",row.tracking_score,"score"),metric("Class",row.class_year),metric("Commitment",row.status),metric("Conf.",row.confidence,"confidence")].join("");document.getElementById("tags").textContent=row.tracking_tags||"Tracked-only profile.";document.getElementById("notes").textContent=(row.tracking_reason||"")+(row.source_links?" Source: "+row.source_links:"");});}());
  </script>
  <script src="../assets/js/ares-paid-preview.js?v=20260520-logo1"></script>
    <script src="../assets/js/ares-mega-nav.js?v=20260520-nav3"></script>
</body>
</html>
