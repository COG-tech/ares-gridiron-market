<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFL Team | ARES Gridiron Market</title>
  <link href="../assets/plugins/global/plugins.bundle.css" rel="stylesheet" media="print" onload="this.media='all'">
  <link href="../assets/css/style.bundle.css" rel="stylesheet" media="print" onload="this.media='all'">
  <link href="../assets/css/ares-theme.css?v=20260520-logo1" rel="stylesheet">
  <link href="../assets/css/ares-components.css?v=20260520-logo1" rel="stylesheet">
  <style>
    .page-main{width:min(100%,1280px);margin:0 auto;padding:clamp(1rem,2.4vw,2rem)}
    .metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1rem}
    @media(max-width:1000px){.metric-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:640px){.metric-grid{grid-template-columns:1fr}}
  </style>
</head>
<body class="ares-shell">
        <header class="ares-topbar ares-mega-topbar" data-ares-root="..">
    <a class="ares-brand" href="../index.html" aria-label="ARES Gridiron Market home"><span><strong>ARES</strong><em>Gridiron Market</em></span></a>
    <button class="ares-nav-toggle" type="button" aria-expanded="false" aria-controls="ares-mega-nav">Menu</button>
    <nav id="ares-mega-nav" class="ares-nav ares-mega-nav" aria-label="Primary navigation">
      <a class="ares-home-link" href="../index.html">Home</a>
    </nav>
  </header>
  <main class="page-main">
    <section id="team-title" class="ares-page-title"><h1>NFL Team</h1><p>Loading team profile...</p></section>
    <section id="team-metrics" class="metric-grid ares-section"></section>
    <section class="ares-card ares-section">
      <h2>Team Ranking Snapshot</h2>
      <div class="table-responsive"><table class="ares-table"><thead><tr><th>Player</th><th>Position</th><th>Age</th><th>ARES</th><th>Market</th><th>Tier</th><th>Conf.</th></tr></thead><tbody id="roster-body"><tr><td colspan="7" class="text-muted">Loading roster snapshot.</td></tr></tbody></table></div>
    </section>
  </main>
  <script src="../assets/js/ares-data-loader.js?v=20260519-graphics1"></script>
  <script src="../assets/js/ares-tables.js?v=20260519-graphics1"></script>
  <script>
    (function(){
      "use strict";
      const safe=window.AresData.safeText;
      const params=new URLSearchParams(window.location.search);
      const teamId=(params.get("team_id")||"").toUpperCase();
      function playerLink(row){return '<a class="fw-bold" href="../players/player-template.html?player_id='+encodeURIComponent(row.player_id||"")+'">'+safe(row.player_name)+'</a>';}
      function metric(label,value){return '<div class="ares-stat-card"><span class="label">'+safe(label)+'</span><span class="value">'+safe(value||"Pending")+'</span></div>';}
      document.addEventListener("DOMContentLoaded",async function(){
        const [teams,ares,market]=await Promise.all([window.AresData.loadJson("../data/teams.json"),window.AresData.loadJson("../data/ares_rankings.json"),window.AresData.loadJson("../data/market_rankings.json")]);
        const team=teams.find(t=>String(t.team_id||t.team_name||"").toUpperCase()===teamId)||teams.find(t=>String(t.team_name||"").toUpperCase()===teamId)||{};
        const name=team.team_name||teamId||"NFL Team";
        document.title=name+" | ARES Gridiron Market";
        document.getElementById("team-title").innerHTML="<h1>"+safe(name)+"</h1><p>"+safe(team.league||"NFL")+" | "+safe(team.conference||"")+"</p>";
        document.getElementById("team-metrics").innerHTML=[
          ["Roster size",team.roster_size],["Average age",team.average_age],["Average ARES",team.average_ares_score],["Average Market",team.average_market_score],
          ["Total Roster Value",team.total_roster_value_score],["Top ARES Player",team.top_ares_player],["Top Market Asset",team.top_market_asset],["Top Young Asset",team.top_young_asset]
        ].map(x=>metric(x[0],x[1])).join("");
        const rows=ares.filter(r=>String(r.team||"").toUpperCase()===teamId).slice(0,20).map(function(r){const m=market.find(x=>x.player_id===r.player_id)||{};return Object.assign({},r,{market_score:m.market_score,market_tier:m.market_tier});});
        document.getElementById("roster-body").innerHTML=rows.length?rows.map(function(r){return "<tr><td>"+playerLink(r)+"</td><td>"+safe(r.position)+"</td><td>"+safe(r.age)+"</td><td>"+window.AresTables.renderScoreChip(r.ares_score,"ares")+"</td><td>"+window.AresTables.renderScoreChip(r.market_score,"market")+"</td><td>"+window.AresTables.renderTierChip(r.market_tier||r.ares_tier)+"</td><td>"+window.AresTables.renderConfidenceChip(r.confidence)+"</td></tr>";}).join(""):'<tr><td colspan="7" class="text-muted">No team roster snapshot is available yet.</td></tr>';
      });
    }());
  </script>
  <script src="../assets/js/ares-paid-preview.js?v=20260520-logo1"></script>
    <script src="../assets/js/ares-mega-nav.js?v=20260520-nav3"></script>
</body>
</html>
