<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ARES logo</title>
  <desc id="desc">Gold ARES A mark on a navy shield medallion.</desc>
  <defs>
    <radialGradient id="navy" cx="50%" cy="42%" r="64%">
      <stop offset="0%" stop-color="#102946"/>
      <stop offset="62%" stop-color="#071b30"/>
      <stop offset="100%" stop-color="#041222"/>
    </radialGradient>
    <linearGradient id="gold" x1="22%" y1="10%" x2="78%" y2="92%">
      <stop offset="0%" stop-color="#fff0a6"/>
      <stop offset="22%" stop-color="#f7c948"/>
      <stop offset="58%" stop-color="#c88a20"/>
      <stop offset="100%" stop-color="#ffe083"/>
