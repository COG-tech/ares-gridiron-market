  <path d="M205 300 256 270 307 300 307 354 256 326 205 354Z" fill="url(#goldDark)" stroke="#ffe083" stroke-width="6"/>
  <path d="M221 386 256 404 291 386 291 450 256 472 221 450Z" fill="url(#gold)" stroke="#8d5c13" stroke-width="5"/>
  <path d="M151 394 256 131 361 394 322 369 256 210 190 369Z" fill="none" stroke="#fff2ad" stroke-width="7" opacity=".9"/>
