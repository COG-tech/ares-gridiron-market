<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>College School | ARES Gridiron Market</title>
  <link href="../assets/plugins/global/plugins.bundle.css" rel="stylesheet" media="print" onload="this.media='all'">
  <link href="../assets/css/style.bundle.css" rel="stylesheet" media="print" onload="this.media='all'">
  <link href="../assets/css/ares-theme.css?v=20260520-nfl-local-logos1" rel="stylesheet">
  <link href="../assets/css/ares-components.css?v=20260520-nfl-local-logos1" rel="stylesheet">
  <style>.page-main{width:min(100%,1280px);margin:0 auto;padding:clamp(1rem,2.4vw,2rem)}.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1rem}@media(max-width:900px){.metric-grid{grid-template-columns:1fr 1fr}}@media(max-width:620px){.metric-grid{grid-template-columns:1fr}}</style>
</head>
<body class="ares-shell">
        <header class="ares-topbar ares-mega-topbar" data-ares-root="..">
    <a class="ares-brand" href="../index.html" aria-label="ARES Gridiron Market home"><span><strong>ARES</strong><em>Gridiron Market</em></span></a>
    <button class="ares-nav-toggle" type="button" aria-expanded="false" aria-controls="ares-mega-nav">Menu</button>
    <nav id="ares-mega-nav" class="ares-nav ares-mega-nav" aria-label="Primary navigation">
      <a class="ares-home-link" href="../index.html">Home</a>
    </nav>
  </header>
  <main class="page-main">
    <section id="school-title" class="ares-page-title"><h1>College School</h1><p>College school setup mode.</p></section>
    <section id="metric-grid" class="metric-grid ares-section"></section>
    <section class="ares-card ares-section"><h2>Players</h2><div class="table-responsive"><table class="ares-table"><thead><tr><th>Player</th><th>Position</th><th>ARES</th><th>Market</th><th>Confidence</th></tr></thead><tbody id="player-body"></tbody></table></div></section>
    <section class="ares-card ares-section"><h2>Scores</h2><div class="table-responsive"><table class="ares-table"><thead><tr><th>Date</th><th>Away</th><th>Home</th><th>Score</th><th>Status</th></tr></thead><tbody id="score-body"></tbody></table></div></section>
  </main><script src="../assets/js/ares-data-loader.js?v=20260519-graphics1"></script><script src="../assets/js/ares-tables.js?v=20260520-nfl-local-logos1"></script>
  <script>
    (function(){const safe=window.AresData.safeText;const school=new URLSearchParams(location.search).get("school")||"";function playerLink(r){return '<a class="fw-bold" href="player-template.html?player_id='+encodeURIComponent(r.player_id||"")+'&player_name='+encodeURIComponent(r.player_name||"")+'">'+safe(r.player_name)+'</a>';}function fallbackRows(watch){return watch.map(function(row){return {player_id:row.player_id,player_name:row.player_name,position:row.position,school:row.committed_school||"Uncommitted",ares_college_score:row.tracking_score,market_score:row.tracking_score,confidence:row.confidence};});}document.addEventListener("DOMContentLoaded",async function(){const [aresRaw,marketRaw,scores,watch]=await Promise.all([window.AresData.loadJson("../data/college_ares_rankings.json"),window.AresData.loadJson("../data/college_market_rankings.json"),window.AresData.loadJson("../data/scores/college_scoreboard.json"),window.AresData.loadJson("../data/tracked_players.json")]);const fallback=fallbackRows(watch);const ares=aresRaw.length?aresRaw:fallback;const market=marketRaw.length?marketRaw:fallback;const players=ares.filter(r=>r.school===school).map(r=>Object.assign({},r,market.find(m=>m.player_id===r.player_id)||{}));const games=scores.filter(r=>r.home_team===school||r.away_team===school);document.title=(school||"College School")+" | ARES Gridiron Market";document.getElementById("school-title").innerHTML="<h1>"+safe(school||"College School")+"</h1><p>College school template</p>";document.getElementById("metric-grid").innerHTML=['<div class="ares-stat-card"><span class="label">Players</span><span class="value">'+players.length+'</span></div>','<div class="ares-stat-card"><span class="label">Games</span><span class="value">'+games.length+'</span></div>','<div class="ares-stat-card"><span class="label">Top Player</span><span class="value">'+safe(players[0]&&players[0].player_name||"Setup mode")+'</span></div>','<div class="ares-stat-card"><span class="label">Status</span><span class="value">Template</span></div>'].join("");document.getElementById("player-body").innerHTML=players.length?players.map(r=>"<tr><td>"+playerLink(r)+"</td><td>"+safe(r.position)+"</td><td>"+window.AresTables.renderScoreChip(r.ares_college_score,"ares")+"</td><td>"+window.AresTables.renderScoreChip(r.market_score,"market")+"</td><td>"+window.AresTables.renderConfidenceChip(r.confidence)+"</td></tr>").join(""):'<tr><td colspan="5" class="text-muted">No college player rows connected yet.</td></tr>';document.getElementById("score-body").innerHTML=games.length?games.map(r=>"<tr><td>"+safe(r.game_date)+"</td><td>"+safe(r.away_team)+"</td><td>"+safe(r.home_team)+"</td><td>"+safe(r.away_score)+" - "+safe(r.home_score)+"</td><td>"+window.AresTables.renderTierChip(r.game_status)+"</td></tr>").join(""):'<tr><td colspan="5" class="text-muted">No college score rows connected yet.</td></tr>';});}());
  </script>
  <script src="../assets/js/ares-paid-preview.js?v=20260520-logo1"></script>
    <script src="../assets/js/ares-mega-nav.js?v=20260520-nfl-local-logos1"></script>
</body>
</html>
